<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KettleQueen® Fundraiser — Order</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<style>
  .flavor-item{position:relative}
  .flavor-item.disabled{opacity:.45;pointer-events:none}
  .flavor-item.disabled::after{content:'Max 3 flavors selected';position:absolute;inset:0;background:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);border-radius:10px;pointer-events:none}
  .flavor-selected-badge{position:absolute;top:8px;right:8px;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
  .order-tab-bar{display:flex;background:var(--white);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.25rem}
  .order-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .15s}
  .order-tab.active{background:var(--burgundy);color:#fff}
  .total-breakdown{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1rem}
  .total-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px}
  .total-row:last-child{border-bottom:none;font-weight:700;font-size:15px;background:var(--cream)}
  .total-row-flavor{color:var(--muted)}
  .total-row-zero{opacity:.4}
  .receipt-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
  .receipt-opt:hover,.receipt-opt.selected{border-color:var(--gold);background:var(--cream)}
  .receipt-opt input[type=radio]{width:auto;flex-shrink:0}
  .pay-section{background:var(--cream);border:1.5px solid var(--gold);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem}
  .pay-title{font-weight:600;font-size:14px;margin-bottom:6px;color:var(--burgundy)}
  .pay-link-btn{display:inline-block;background:var(--gold);color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:700;font-size:13px;margin-top:6px}
  .flavor-limit-bar{display:flex;gap:6px;margin-bottom:1rem;align-items:center;font-size:13px;color:var(--muted)}
  .limit-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);transition:background .2s}
  .limit-dot.filled{background:var(--gold);border-color:var(--gold)}
</style>
</head>
<body>
<div class="order-wrap" id="order-wrap">
  <div class="empty-state" style="padding:3rem">Loading...</div>
</div>
<script src="logo_b64.js"></script>
<script>window.KQ_WORKER_URL = "";</script>
<script src="shared.js"></script>
<script src="receipt.js"></script>
<script>
let school = null;
let qty = {};
let activeTab = 'order'; // 'order' or 'total'

function init() {
  const d = kqLoad();
  const sid = getParam('school');
  const studentId = getParam('student');
  if (!sid) { renderError('No school specified.'); return; }
  school = (d.schools||[]).find(s => s.id === sid);
  if (!school) { renderError('School not found. Please check your link.'); return; }
  qty = {};
  renderPage();
}

function renderError(msg) {
  document.getElementById('order-wrap').innerHTML = `<div class="empty-state" style="padding:3rem">${msg}</div>`;
}

function heroHtml(sc) {
  const logoEl = sc.logo
    ? `<img src="${sc.logo}" class="hero-logo" alt="${sc.name}">`
    : `<div class="hero-initials" style="background:${sc.color||'#6B1D2E'}">${sc.initials||'??'}</div>`;
  return `<div class="school-hero">
    ${logoEl}
    <div class="hero-name">${sc.name}</div>
    <div class="hero-sub">KettleQueen® Fundraiser${sc.deadline?' · Deadline: '+sc.deadline:''}</div>
    ${sc.contact||sc.phone||sc.address ? `<div class="hero-contact">
      ${sc.contact?sc.contact+' · ':''}${sc.phone||''}${sc.address?' · '+sc.address:''}
    </div>` : ''}
  </div>`;
}

function kqDividerHtml() {
  const logo = typeof window.KQ_LOGO !== 'undefined' ? window.KQ_LOGO : null;
  return `<div class="kq-divider">
    ${logo ? `<img src="${logo}" alt="KettleQueen" style="height:44px;object-fit:contain">` : '<span style="font-size:28px">👑</span>'}
    <div class="kq-divider-line"></div>
    <div><div class="kq-div-name">KettleQueen® Artisan Kettlecorn</div><div class="kq-div-tag">${KQ.contact.tagline}</div></div>
  </div>`;
}

function selectedCount() {
  return KQ.defaultFlavors.filter(f => (qty[f.id]||0) > 0).length;
}

function renderPage() {
  const wrap = document.getElementById('order-wrap');
  const flavors = getSchoolFlavors(school);
  const selected = selectedCount();
  const maxReached = selected >= 3;

  wrap.innerHTML = `
    ${heroHtml(school)}
    ${kqDividerHtml()}

    <div class="order-tab-bar">
      <button class="order-tab ${activeTab==='order'?'active':''}" onclick="switchTab('order')">🛒 Select Flavors</button>
      <button class="order-tab ${activeTab==='total'?'active':''}" onclick="switchTab('total')">📊 My Total</button>
    </div>

    <div id="tab-order" ${activeTab!=='order'?'style="display:none"':''}>
      <div style="font-size:13px;color:var(--muted);margin-bottom:.75rem">Choose up to <strong>3 flavors</strong>. Fresh-popped small-batch kettlecorn.</div>
      <div class="flavor-limit-bar">
        <span>Flavors selected:</span>
        ${[0,1,2].map(i=>`<div class="limit-dot ${i<selected?'filled':''}" id="dot-${i}"></div>`).join('')}
        <span>${selected}/3</span>
      </div>
      <div id="flavor-list">
        ${flavors.map(f => {
          const q = qty[f.id]||0;
          const isSelected = q > 0;
          const isDisabled = maxReached && !isSelected;
          return `<div class="flavor-item ${isSelected?'active':''} ${isDisabled?'disabled':''}" id="fi-${f.id}">
            ${isSelected?'<span class="flavor-selected-badge">✓ Selected</span>':''}
            <div class="flavor-dot" style="background:${f.color}"></div>
            <div class="flavor-info">
              <div class="flavor-name">${f.name}</div>
              <div class="flavor-desc">${f.desc}</div>
            </div>
            <span class="flavor-price">$${f.price}/bag</span>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty('${f.id}',-1)">−</button>
              <span class="qty-val" id="qv-${f.id}">${q}</span>
              <button class="qty-btn" onclick="changeQty('${f.id}',1)">+</button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="text-align:center;margin-top:1rem">
        <button class="btn btn-gold" onclick="switchTab('total')" ${!Object.values(qty).some(v=>v>0)?'disabled':''}>
          View My Total →
        </button>
      </div>
    </div>

    <div id="tab-total" ${activeTab!=='total'?'style="display:none"':''}>
      <div id="total-breakdown-wrap"></div>
      ${school.payLink ? `
        <div class="pay-section">
          <div class="pay-title">💳 Payment Options</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:6px">Pay cash or check to the school, OR pay digitally:</div>
          <a href="${school.payLink}" target="_blank" class="pay-link-btn">Pay via ${school.payLink.includes('venmo')?'Venmo':school.payLink.includes('paypal')?'PayPal':school.payLink.includes('zelle')?'Zelle':'Digital'}</a>
          ${school.payInstr?`<div style="font-size:12px;color:var(--muted);margin-top:6px">${school.payInstr}</div>`:''}
        </div>` : `
        <div class="pay-section">
          <div class="pay-title">💵 Payment</div>
          <div style="font-size:13px;color:var(--muted)">Pay cash or check to your school coordinator.</div>
        </div>`}
      <div style="font-weight:600;font-size:15px;margin-bottom:.75rem">Your Information</div>
      <div style="display:grid;gap:10px;margin-bottom:1.25rem">
        <input type="text" id="cust-name" placeholder="Full Name *">
        <input type="text" id="cust-student" placeholder="Student's Name (helps coordinator)">
        <input type="email" id="cust-email" placeholder="Email address">
        <input type="tel" id="cust-phone" placeholder="Mobile number (for text receipt)">
      </div>
      <div style="font-weight:600;font-size:15px;margin-bottom:.75rem">Receipt Preference</div>
      <div id="receipt-opts">
        <div class="receipt-opt selected" id="ro-email" onclick="selectReceipt('email')">
          <input type="radio" name="receipt" value="email" checked> 📧 Email receipt
        </div>
        <div class="receipt-opt" id="ro-sms" onclick="selectReceipt('sms')">
          <input type="radio" name="receipt" value="sms"> 📱 Text (SMS) receipt
        </div>
        <div class="receipt-opt" id="ro-none" onclick="selectReceipt('none')">
          <input type="radio" name="receipt" value="none"> No receipt needed
        </div>
      </div>
      <button class="btn btn-block" style="margin-top:1.25rem" onclick="submitOrder()" id="submit-btn">Submit My Order →</button>
    </div>

    ${kqFooterHtml()}`;

  renderTotalBreakdown();
}

function switchTab(tab) {
  activeTab = tab;
  renderPage();
  // restore inputs
}

function changeQty(fid, delta) {
  const current = qty[fid]||0;
  const newVal = Math.max(0, current + delta);
  // enforce max 3 flavors
  if (delta > 0 && current === 0 && selectedCount() >= 3) {
    toast('Maximum 3 flavors — remove one to add another.'); return;
  }
  qty[fid] = newVal;
  renderPage();
}

function renderTotalBreakdown() {
  const el = document.getElementById('total-breakdown-wrap'); if(!el) return;
  const flavors = getSchoolFlavors(school);
  const rows = flavors.map(f => {
    const q = qty[f.id]||0;
    const subtotal = q * f.price;
    return { f, q, subtotal };
  });
  const grandTotal = rows.reduce((s,r)=>s+r.subtotal,0);
  const totalBagsCount = rows.reduce((s,r)=>s+r.q,0);

  el.innerHTML = `<div class="total-breakdown">
    ${rows.map(r => `
      <div class="total-row ${r.q===0?'total-row-zero':''}">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:9px;height:9px;border-radius:50%;background:${r.f.color}"></div>
          <span class="total-row-flavor">${r.f.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <span style="font-size:12px;color:var(--muted)">${r.q} × $${r.f.price}</span>
          <span style="min-width:48px;text-align:right;font-weight:${r.q>0?'600':'400'}">$${r.subtotal.toFixed(2)}</span>
        </div>
      </div>`).join('')}
    <div class="total-row">
      <span>Total (${totalBagsCount} bag${totalBagsCount!==1?'s':''})</span>
      <span style="font-family:'Playfair Display',serif;font-size:20px;color:var(--burgundy)">$${grandTotal.toFixed(2)}</span>
    </div>
  </div>`;
}

function selectReceipt(type) {
  ['email','sms','none'].forEach(t => {
    const el = document.getElementById('ro-'+t);
    if(el) { el.classList.toggle('selected', t===type); el.querySelector('input').checked = t===type; }
  });
}

function submitOrder() {
  const name = document.getElementById('cust-name')?.value.trim();
  if (!name) { toast('Please enter your name.'); return; }
  const bags = Object.values(qty).reduce((s,v)=>s+v,0);
  if (!bags) { toast('Please select at least one flavor and quantity.'); return; }
  const flavors = getSchoolFlavors(school);
  const total = flavors.reduce((s,f)=>s+(qty[f.id]||0)*f.price,0);
  const receiptType = document.querySelector('input[name=receipt]:checked')?.value||'none';
  const email = document.getElementById('cust-email')?.value.trim();
  const phone = document.getElementById('cust-phone')?.value.trim();

  if (receiptType==='email' && !email) { toast('Please enter your email for the receipt.'); return; }
  if (receiptType==='sms' && !phone) { toast('Please enter your mobile number for the text receipt.'); return; }

  const order = {
    id: 'ord_'+Date.now(),
    schoolId: school.id,
    studentId: studentId||'',
    customerName: name,
    customerEmail: email||'',
    customerPhone: phone||'',
    studentName: document.getElementById('cust-student')?.value.trim()||'',
    flavors: {...qty},
    totalBags: bags,
    total,
    receiptType,
    date: new Date().toISOString(),
  };

  const d = kqLoad();
  if (!d.orders) d.orders = [];
  d.orders.push(order);
  kqSave(d);

  // Send receipt
  const flavors = getSchoolFlavors(school);
  if (receiptType === 'email' && order.customerEmail) {
    sendEmailReceipt(order, school, flavors).catch(()=>{});
  }
  if (receiptType === 'sms' && order.customerPhone) {
    sendSMSReceipt(order, school, flavors, order.customerPhone).catch(()=>{});
  }
  notifyAdmin(order, school, flavors).catch(()=>{});

  renderSuccess(order, total, bags, receiptType);
}

function sendEmailReceipt(order, total, bags) {
  const d = kqLoad();
  const adminEmail = d.settings?.email || 'info@kettlequeen.com';
  const flavors = getSchoolFlavors(school);
  const flavStr = flavors.filter(f=>(order.flavors[f.id]||0)>0)
    .map(f=>`  ${f.name}: ${order.flavors[f.id]} bag(s) @ $${f.price} = $${(order.flavors[f.id]*f.price).toFixed(2)}`).join('\n');
  const subject = `KettleQueen Order — ${school.name}`;
  const body = `Hi ${order.customerName},\n\nThank you for your KettleQueen® Artisan Kettlecorn order!\n\nSchool: ${school.name}\nStudent: ${order.studentName||'—'}\n\nOrder:\n${flavStr}\n\nTotal: $${total.toFixed(2)} (${bags} bag${bags!==1?'s':''})\n\nPayment: Please pay your school coordinator.\n\n${school.payLink?'Or pay digitally: '+school.payLink+'\n\n':''}Questions? Contact KettleQueen:\n${KQ.contact.phone} · ${KQ.contact.email} · ${KQ.contact.webUrl}\n\n${KQ.contact.faith}`;
  // Open email to customer
  if (order.customerEmail) {
    window.open(`mailto:${order.customerEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
  }
  // Notify admin
  setTimeout(() => {
    const adminSubj = `New Fundraiser Order — ${school.name}`;
    const adminBody = `New order from ${order.customerName}\nSchool: ${school.name}\n\n${flavStr}\n\nTotal: $${total.toFixed(2)}\nDate: ${new Date(order.date).toLocaleString()}`;
    window.open(`mailto:${adminEmail}?subject=${encodeURIComponent(adminSubj)}&body=${encodeURIComponent(adminBody)}`);
  }, 500);
}

async function sendSMSReceipt(order, total, bags, phone) {
  const flavors = getSchoolFlavors(school);
  const flavStr = flavors.filter(f=>(order.flavors[f.id]||0)>0)
    .map(f=>`${f.name} x${order.flavors[f.id]}`).join(', ');
  const msg = `KettleQueen® Order Confirmed!\nSchool: ${school.name}\nFlavors: ${flavStr}\nTotal: $${total.toFixed(2)} (${bags} bags)\nPay your school coordinator.\nQuestions: ${KQ.contact.phone}`;
  try {
    const res = await fetch('/functions/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: phone, message: msg }),
    });
    const json = await res.json();
    if (!json.success) toast('SMS could not be sent — check Twilio settings.');
  } catch(e) {
    toast('SMS unavailable — email receipt sent instead.');
    sendEmailReceipt(order, total, bags);
  }
}

function renderSuccess(order, total, bags, receiptType) {
  const wrap = document.getElementById('order-wrap');
  const logo = typeof window.KQ_LOGO !== 'undefined' ? window.KQ_LOGO : null;
  const flavors = getSchoolFlavors(school);
  const flavStr = flavors.filter(f=>(order.flavors[f.id]||0)>0)
    .map(f=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span>${f.name} × ${order.flavors[f.id]}</span>
      <span>$${(order.flavors[f.id]*f.price).toFixed(2)}</span>
    </div>`).join('');

  wrap.innerHTML = `
    ${heroHtml(school)}
    <div class="success-box" style="margin:1rem 0">
      <div style="font-size:48px;margin-bottom:10px">🎉</div>
      <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#27500A;margin-bottom:8px">Order Confirmed!</div>
      <div style="font-size:14px;color:#3B6D11">Thank you, ${order.customerName}!</div>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div class="card-title" style="margin-bottom:.75rem">Order Summary</div>
      ${flavStr}
      <div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:16px">
        <span>Total (${bags} bag${bags!==1?'s':''})</span>
        <span style="font-family:'Playfair Display',serif;color:var(--burgundy)">$${total.toFixed(2)}</span>
      </div>
    </div>

    ${school.payLink ? `
      <div class="pay-section" style="margin-bottom:1rem">
        <div class="pay-title">💳 Complete Your Payment</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Pay cash/check at school OR digitally:</div>
        <a href="${school.payLink}" target="_blank" class="pay-link-btn">Pay $${total.toFixed(2)} Now</a>
        ${school.payInstr?`<div style="font-size:12px;color:var(--muted);margin-top:6px">${school.payInstr}</div>`:''}
      </div>` : `
      <div class="pay-section" style="margin-bottom:1rem">
        <div class="pay-title">💵 Payment</div>
        <div style="font-size:13px;color:var(--muted)">Please pay <strong>$${total.toFixed(2)}</strong> to your school coordinator by cash or check.</div>
      </div>`}

    <div class="info-box" style="margin-bottom:1.5rem">
      ${receiptType==='email'?'📧 A receipt has been sent to your email.':receiptType==='sms'?'📱 A text receipt has been sent to your phone.':'No receipt requested.'}
    </div>

    <div style="text-align:center;margin-bottom:1.5rem">
      <button class="btn btn-outline" onclick="qty={};activeTab='order';renderPage()">Place Another Order</button>
    </div>

    <div class="kq-footer">
      ${logo?`<img src="${logo}" alt="KettleQueen" style="height:52px;object-fit:contain;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto">`:''}
      <div class="kq-footer-name">KettleQueen® Artisan Kettlecorn</div>
      <div class="kq-footer-tag">${KQ.contact.tagline}</div>
      <div class="kq-footer-tag">${KQ.contact.faith}</div>
      <div class="kq-footer-contact">
        <a href="tel:5597236484">${KQ.contact.phone}</a> &nbsp;·&nbsp;
        <a href="mailto:${KQ.contact.email}">${KQ.contact.email}</a> &nbsp;·&nbsp;
        <a href="${KQ.contact.webUrl}" target="_blank">${KQ.contact.web}</a>
      </div>
    </div>`;
}

init();
</script>
</body>
</html>
